stages:
  - quality
  - test
  - build
  - deploy

# ── variáveis de ambiente compartilhadas (CI) ─────────────────────────────────
.ci_env: &ci_env
  POSTGRES_DB: aplicativo_atividades_fisicas
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  DATABASE_URL: 'postgresql://postgres:postgres@postgres/aplicativo_atividades_fisicas'
  NODE_ENV: 'ci'
  PORT: '1350'
  BETTER_AUTH_SECRET: 'ci-secret-key-pipeline-only-not-production-32chars'
  BETTER_AUTH_URL: 'http://localhost:1350'
  API_BASE_URL: 'http://localhost:1350/api'
  MINIO_ENDPOINT: 'localhost'
  MINIO_PORT: '9000'
  MINIO_USE_SSL: 'false'
  MINIO_ACCESS_KEY: 'ci-access-key'
  MINIO_SECRET_KEY: 'ci-secret-key'
  MINIO_BUCKET_FOTOS: 'ci-bucket'
  MINIO_LOCAL: 'true'
  MINIO_PUBLIC_URL: ''
  AWS_ACCESS_KEY_ID: 'ci-access-key'
  AWS_SECRET_ACCESS_KEY: 'ci-secret-key'
  AWS_REGION: 'us-east-1'
  AWS_BUCKET_NAME: 'ci-bucket'
  AWS_ENDPOINT_URL: 'http://localhost:9000'
  AWS_PUBLIC_URL: ''
  UPLOAD_MAX_FILE_SIZE_MB: '20'
  EXERCISEDB_API_KEY: 'ci-key'
  EXERCISEDB_API_HOST: 'exercisedb.p.rapidapi.com'
  EXERCISEDB_BASE_URL: 'https://exercisedb.p.rapidapi.com'

# ── serviço postgres compartilhado ────────────────────────────────────────────
.postgres_service: &postgres_service
  - name: postgres:17-alpine
    alias: postgres

# ── cache npm com fallback ────────────────────────────────────────────────────
.npm_cache: &npm_cache
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - node_modules/
      policy: pull-push
    - key: 'npm-fallback'
      paths:
        - node_modules/
      policy: pull

default:
  image: node:22-alpine
  <<: *npm_cache

# ── quality ───────────────────────────────────────────────────────────────────
# TypeScript check — roda apenas em MR
# ─────────────────────────────────────────────────────────────────────────────

quality:
  stage: quality
  before_script:
    - npm ci
  script:
    - npx tsc --noEmit
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── smoke ─────────────────────────────────────────────────────────────────────
# Sobe servidor com banco real e valida /api — roda em paralelo com quality
# ─────────────────────────────────────────────────────────────────────────────

smoke:
  stage: quality
  services: *postgres_service
  variables:
    <<: *ci_env
  before_script:
    - apk add --no-cache curl
    - npm ci
  script:
    - npx tsx src/server.ts &
    - |
      for i in $(seq 1 15); do
        curl -sf http://localhost:1350/api && break
        echo "Aguardando servidor... tentativa $i/15"
        sleep 2
      done
    - curl -sf http://localhost:1350/api
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── test ──────────────────────────────────────────────────────────────────────
# Testes de integração com banco real — roda apenas em MR, após quality+smoke
# ─────────────────────────────────────────────────────────────────────────────

test:
  stage: test
  services: *postgres_service
  variables:
    <<: *ci_env
    NODE_ENV: 'test'
    DATABASE_URL_TEST: 'postgresql://postgres:postgres@postgres/aplicativo_atividades_fisicas_test'
  before_script:
    - npm ci
  script:
    - npm run test:setup
    - npm test -- --runInBand --forceExit
  needs: [quality, smoke]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── build ─────────────────────────────────────────────────────────────────────
# Runner k3s (ARM64 nativo) — build somente linux/arm64.
# O cluster k3s de deploy é ARM64, portanto amd64 não é necessário.
#
# NECESSIDADE FUTURA — suporte a amd64 (ex: devs com máquinas Intel/AMD):
#   A abordagem correta é builds nativos paralelos (sem emulação QEMU):
#   1. Adicionar stage "manifest" após "build" no topo do arquivo.
#   2. Dividir este job em dois:
#      - build-arm64: tags [k3s-vm-fabrica], --platform linux/arm64, push tag :SHA-arm64
#      - build-amd64: sem tags (shared runner AMD64), --platform linux/amd64, push tag :SHA-amd64
#   3. Adicionar job merge-manifest com needs [build-arm64, build-amd64]:
#      docker buildx imagetools create -t imagem:TAG :SHA-arm64 :SHA-amd64
#   Resultado: dois builds nativos em paralelo, sem QEMU, ~2-4 min total.
#
# Requer variáveis CI/CD: DOCKERHUB_USER, DOCKERHUB_TOKEN
# ─────────────────────────────────────────────────────────────────────────────

build:
  stage: build
  tags:
    - k3s-vm-fabrica
  image: docker:27
  services:
    - name: docker:27-dind
      command: ['--tls=false']
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ''
  before_script:
    - docker buildx create --name builder --driver docker-container --use 2>/dev/null || docker buildx use builder
    - docker buildx inspect --bootstrap
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAG_SUFFIX="latest"
      else
        TAG_SUFFIX="$CI_COMMIT_BRANCH"
      fi
      docker buildx build \
        --platform linux/arm64 \
        --cache-from type=registry,ref=yurizetoles/atividades_fisicas_api:buildcache \
        --cache-to type=registry,ref=yurizetoles/atividades_fisicas_api:buildcache,mode=max \
        -t yurizetoles/atividades_fisicas_api:$TAG_SUFFIX \
        -t yurizetoles/atividades_fisicas_api:$CI_COMMIT_SHORT_SHA \
        --push .
  after_script:
    - docker logout
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── deploy ────────────────────────────────────────────────────────────────────
# Runner k3s — kubectl via in-cluster config
# ─────────────────────────────────────────────────────────────────────────────

deploy-qa:
  stage: deploy
  tags:
    - k3s-vm-fabrica
  image: bitnami/kubectl:latest
  needs: [build]
  script:
    - kubectl rollout restart deployment/atividades-fisicas-api-qa -n fabricaiv
    - kubectl rollout status deployment/atividades-fisicas-api-qa -n fabricaiv --timeout=120s
  environment:
    name: qa
    url: https://atividadesfisicas-api-qa.yuriprojects.dpdns.org
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

deploy-prod:
  stage: deploy
  tags:
    - k3s-vm-fabrica
  image: bitnami/kubectl:latest
  needs: [build]
  script:
    - kubectl rollout restart deployment/atividades-fisicas-api -n fabricaiv
    - kubectl rollout status deployment/atividades-fisicas-api -n fabricaiv --timeout=120s
  environment:
    name: production
    url: https://atividadesfisicas-api.yuriprojects.dpdns.org
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
