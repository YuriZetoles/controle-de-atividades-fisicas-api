# SECRET EXAMPLE — API Atividades Físicas
# Copie para atividades-fisicas-secret.secret.yaml e preencha os valores.
#
# Gerar senhas seguras:
#   POSTGRES_PASSWORD: openssl rand -hex 32
#   BETTER_AUTH_SECRET: openssl rand -base64 48
#
# stringData aceita texto puro — o Kubernetes faz o base64 automaticamente.

apiVersion: v1
kind: Secret
metadata:
  name: atividades-fisicas-secret
  namespace: fabricaiv
  labels:
    io.kompose.service: atividades-fisicas
type: Opaque
stringData:
  # POSTGRESQL — use senha hexadecimal (sem chars especiais): openssl rand -hex 32
  POSTGRES_PASSWORD: '<GERAR_COM_OPENSSL_rand_hex_32>'
  DATABASE_URL: 'postgresql://atividadefisicas:<POSTGRES_PASSWORD>@atividades-fisicas-db:5432/aplicativo_atividades_fisicas'
  DATABASE_URL_TEST: 'postgresql://atividadefisicas:<POSTGRES_PASSWORD>@atividades-fisicas-db:5432/aplicativo_atividades_fisicas_test'

  # BETTER AUTH — gerar: openssl rand -base64 48
  BETTER_AUTH_SECRET: '<GERAR_COM_OPENSSL_rand_base64_48>'

  # MINIO / S3
  MINIO_ACCESS_KEY: '<MINIO_ACCESS_KEY>'
  MINIO_SECRET_KEY: '<MINIO_SECRET_KEY>'

  # AWS (alias MinIO — mesmos valores)
  AWS_ACCESS_KEY_ID: '<AWS_ACCESS_KEY_ID>'
  AWS_SECRET_ACCESS_KEY: '<AWS_SECRET_ACCESS_KEY>'

  # EXERCISEDB (RapidAPI)
  EXERCISEDB_API_KEY: '<EXERCISEDB_API_KEY>'
