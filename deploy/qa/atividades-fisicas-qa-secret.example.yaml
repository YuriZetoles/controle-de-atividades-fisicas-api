# SECRET EXAMPLE — QA API Atividades Físicas
# Copie para atividades-fisicas-qa-secret.secret.yaml e preencha os valores.
#
# O QA usa banco separado: aplicativo_atividades_fisicas_qa (não compartilha dados com produção).
# Use a mesma POSTGRES_PASSWORD de produção (mesmo servidor PostgreSQL).
# Gere um BETTER_AUTH_SECRET diferente do de produção para isolamento de sessões.

apiVersion: v1
kind: Secret
metadata:
  name: atividades-fisicas-qa-secret
  namespace: fabricaiv
  labels:
    io.kompose.service: atividades-fisicas-api-qa
    environment: qa
type: Opaque
stringData:
  # POSTGRESQL — mesma senha do prod (mesmo servidor), banco diferente
  POSTGRES_PASSWORD: '<MESMA_SENHA_DO_POSTGRES_PROD>'
  DATABASE_URL: 'postgresql://atividadefisicas:<MESMA_SENHA_DO_POSTGRES_PROD>@atividades-fisicas-db:5432/aplicativo_atividades_fisicas_qa'
  DATABASE_URL_TEST: 'postgresql://atividadefisicas:<MESMA_SENHA_DO_POSTGRES_PROD>@atividades-fisicas-db:5432/aplicativo_atividades_fisicas_qa_test'

  # BETTER AUTH — gerar: openssl rand -base64 48 (diferente do prod)
  BETTER_AUTH_SECRET: '<GERAR_COM_OPENSSL_rand_base64_48>'

  # MINIO / S3
  MINIO_ACCESS_KEY: '<MINIO_ACCESS_KEY>'
  MINIO_SECRET_KEY: '<MINIO_SECRET_KEY>'

  # AWS (alias MinIO — mesmos valores)
  AWS_ACCESS_KEY_ID: '<AWS_ACCESS_KEY_ID>'
  AWS_SECRET_ACCESS_KEY: '<AWS_SECRET_ACCESS_KEY>'

  # EXERCISEDB (RapidAPI)
  EXERCISEDB_API_KEY: '<EXERCISEDB_API_KEY>'
