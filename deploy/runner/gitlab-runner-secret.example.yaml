# SECRET EXAMPLE — GitLab Runner fabricaIV (namespace: tools)
# Copie para gitlab-runner-secret.secret.yaml e preencha o token.
#
# Gerar o token: GitLab → fslab.dev → Projeto → Settings → CI/CD → Runners → New project runner
#   - Tag: k3s-vm
#   - Run untagged jobs: NÃO
#   - Copiar o token gerado (formato: glrt-...)
#
# Aplicar ANTES do helm install:
#   kubectl apply -f deploy/runner/gitlab-runner-secret.secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: gitlab-runner-fabricaiv-secret
  namespace: tools
type: Opaque
stringData:
  runner-token: '<TOKEN_GERADO_NO_GITLAB_FSLAB_glrt-...>'
  runner-registration-token: ''
